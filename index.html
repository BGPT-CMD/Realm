<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosmic Gateway</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      font-family: 'Trebuchet MS', sans-serif;
      background:
        radial-gradient(circle at center, #1a0033 0%, #050510 40%, #000000 100%);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      color:white;
    }

    /* STAR FIELD */
    .stars{
      position:absolute;
      width:100%;
      height:100%;
      background:
        transparent;
      overflow:hidden;
    }

    .stars::before,
    .stars::after{
      content:"";
      position:absolute;
      width:200%;
      height:200%;
      background-image:
        radial-gradient(white 1px, transparent 1px);
      background-size:50px 50px;
      animation: drift 120s linear infinite;
      opacity:0.4;
    }

    .stars::after{
      background-size:80px 80px;
      opacity:0.2;
      animation-duration:180s;
    }

    @keyframes drift{
      from{
        transform:translate(0,0);
      }
      to{
        transform:translate(-300px,-300px);
      }
    }

    /* BLACK HOLE */
    .black-hole{
      position:absolute;
      width:450px;
      height:450px;
      border-radius:50%;
      background:
        radial-gradient(circle,
        #000 25%,
        #220044 45%,
        #4400aa 60%,
        transparent 70%);
      box-shadow:
        0 0 80px #6a00ff,
        0 0 140px #4b0082;
      animation: rotateHole 20s linear infinite;
      filter: blur(1px);
    }

    @keyframes rotateHole{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    /* ENTER STAR BUTTON */
    .enter-star{
      position:relative;
      width:180px;
      height:180px;
      background:
        radial-gradient(circle,
        #fff9c4 0%,
        #ffe066 20%,
        #ffcc00 45%,
        #ff9900 70%,
        rgba(255,255,255,0) 100%);
      clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%,
        68% 57%, 79% 91%, 50% 70%,
        21% 91%, 32% 57%, 2% 35%, 39% 35%
      );
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      cursor:pointer;
      color:white;
      font-weight:bold;
      font-size:1.1rem;
      text-shadow:0 0 10px white;
      text-decoration:none;
      z-index:10;

      animation:
        pulse 2s infinite,
        floatStar 5s ease-in-out infinite;

      box-shadow:
        0 0 20px #fff176,
        0 0 40px #ffea00,
        0 0 80px #ffd000;
    }

    .enter-star:hover{
      transform:scale(1.08);
      box-shadow:
        0 0 30px white,
        0 0 60px #fff176,
        0 0 120px #ffd000;
    }

    @keyframes pulse{
      0%,100%{
        filter:brightness(1);
      }
      50%{
        filter:brightness(1.5);
      }
    }

    @keyframes floatStar{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-12px);
      }
    }

    .subtitle{
      position:absolute;
      bottom:50px;
      letter-spacing:4px;
      opacity:0.7;
      font-size:0.9rem;
      text-transform:uppercase;
    }

  </style>
</head>
<body>

  <div class="stars"></div>
  <div class="black-hole"></div>

  <a class="enter-star" href="portal.html">
    Enter<br>If You Dare
  </a>

  <div class="subtitle">
    Beyond the Event Horizon
  </div>

</body>
</html>
